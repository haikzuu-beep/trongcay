<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 Trồng Cây</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#dff6dd;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.box{
    background:white;
    width:700px;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.2);
}

h1{
    color:#168f2c;
}

button{
    background:#168f2c;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0f6e21;
}

#garden{
    margin-top:25px;
    min-height:220px;
    background:#eefbe9;
    border:2px dashed #8dc98d;
    border-radius:15px;
    padding:15px;

    display:grid;
    grid-template-columns:repeat(8,1fr);
    gap:10px;
    font-size:40px;
}

.info{
    font-size:22px;
    margin:20px;
}
</style>
</head>

<body>

<div class="box">

<h1>🌱 Trồng Cây</h1>

<p>Hãy biến nơi này thành một khu rừng!</p>

<button onclick="plant()">🌱 Trồng cây</button>

<div class="info">
🌳 Đã trồng: <span id="count">0</span> cây
</div>

<div id="garden"></div>

</div>

<script>

let tree = Number(localStorage.getItem("tree")) || 0;

const garden = document.getElementById("garden");
const count = document.getElementById("count");

function draw(){

    garden.innerHTML="";

    for(let i=0;i<tree;i++){

        let t=document.createElement("div");
        t.innerHTML="🌳";

        garden.appendChild(t);
    }

    count.innerHTML=tree;

    localStorage.setItem("tree",tree);
}

function plant(){

    tree++;

    draw();

}

draw();

</script>

</body>
</html>
